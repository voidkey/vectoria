# Alertmanager config for vectoria.
#
# Single route → single receiver → the wecom-group-bot relay running
# as a sidecar. Groups alerts that arrive close together so a storm
# ships as one wecom message instead of N messages; repeats once per
# hour while an alert stays firing so nobody forgets.
#
# For multi-environment / multi-team fan-out add child routes under
# ``routes:`` with ``matchers:`` on labels (severity, component, …).

global:
  resolve_timeout: 5m

route:
  receiver: wecom
  # group_by: fold alerts on the same alert+labelset into one message.
  # alertname+severity keeps DLQ-across-task_types in a single bundle
  # without collapsing unrelated alerts.
  group_by: ['alertname', 'severity']
  group_wait: 30s       # sit on the first firing for 30s to collect more
  group_interval: 5m    # resend when a new alert joins a live group
  repeat_interval: 1h   # re-ping while still firing so it doesn't fade
  routes:
    # Dead-letter alerts are an operator inbox, not a live metric — the
    # annotation already carries task_id + source + UPDATE/DELETE SQL so
    # one notification is enough to act on. Hourly repeats just create
    # the "looks like a new error" confusion in the wecom group. Long
    # repeat_interval (> metric's 24h auto-expiry) effectively makes
    # this edge-triggered: 🟡 once when task dies, ✅ once when operator
    # acts OR after 24h auto-expire — and silent in between.
    - matchers:
        - alertname = VectoriaDeadTaskAccumulating
      # Must stay <= alertmanager's data retention (120h default) to
      # keep dedup state alive — anything longer warns and risks a
      # spurious re-notification once retention rolls. 96h is well
      # past the 24h metric auto-expiry so this is effectively
      # "never repeat" in practice.
      repeat_interval: 96h

receivers:
  - name: wecom
    webhook_configs:
      # ``alert-relay`` is the sidecar service name in the monitoring
      # compose. It reshapes the payload to wecom's group-bot contract
      # and forwards to the webhook URL from its WECOM_WEBHOOK_URL env.
      - url: http://alert-relay:8080/alert
        send_resolved: true

# 抑制规则：避免告警风暴时重要信息被淹没。
# 触发逻辑：source 告警存在时，target 告警会被静默（仍在 prometheus
# 里处于 firing，但不推送到 wecom）。equal 字段未填意味着全局生效，
# 适合单实例部署；多实例时应补 equal: ['instance'] 以防跨实例误抑制。
inhibit_rules:

  # Worker 整体不可达时，worker 侧所有细粒度告警都是这个根因的下游。
  # 先告 "Worker 挂了"，不要同时洗屏 "队列堆积"、"解析失败"、"内存超"。
  - source_matchers:
      - alertname = VectoriaWorkerAbsent
    target_matchers:
      - component =~ "worker|queue|parser|documents"
      - alertname != VectoriaWorkerAbsent

  # API 整体不可达时，API 侧的错误率/延迟告警不用再报。
  - source_matchers:
      - alertname = VectoriaApiAbsent
    target_matchers:
      - component = api
      - alertname != VectoriaApiAbsent
