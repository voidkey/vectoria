# Prometheus alerting rules for vectoria.
#
# Scope: operational alerts that a human should act on. Rules fire on
# sustained conditions (``for:``) rather than spikes so transient blips
# (redeploys, GC pauses, cold starts) don't page. Thresholds are tuned
# for a single-node test/prod deploy; multi-instance fleets may want
# to aggregate with ``sum by (instance)`` first.
#
# Drop into a Prometheus rule_files: directive:
#
#   rule_files:
#     - /etc/prometheus/vectoria-rules.yaml
#
# Then hot-reload with ``curl -XPOST http://prom:9090/-/reload`` or
# SIGHUP — changes take effect without restart.
groups:

  # ---------------------------------------------------------------
  # API (RED — rate, errors, duration per endpoint)
  # ---------------------------------------------------------------
  # Data comes from prometheus_fastapi_instrumentator: per-handler
  # labels on ``http_requests_total`` + ``http_request_duration_seconds``.
  # ``handler`` is the route template (``/v1/knowledgebases/{kb_id}/
  # documents/url``), ``status`` is the response code, ``method`` is
  # the verb. Excluded: ``/metrics`` and ``/health`` (health spam).
  - name: vectoria.api
    rules:

      - alert: VectoriaApiServerErrorRate
        # >5% 5xx over 5 minutes on any single handler means that
        # endpoint is broken for users. Per-handler so an error in
        # /query doesn't mask a healthy /documents/file (or vice
        # versa). Symptom-level alert — the operator doesn't need to
        # know *why*, just that callers are seeing errors.
        expr: |
          sum by (handler) (rate(http_requests_total{status=~"5..",handler!~"/metrics|/health.*"}[5m]))
          /
          sum by (handler) (rate(http_requests_total{handler!~"/metrics|/health.*"}[5m]))
          > 0.05
        for: 5m
        labels:
          severity: critical
          component: api
        annotations:
          summary: "API 5xx rate >5% on {{ $labels.handler }}"
          description: >
            5xx error rate on {{ $labels.handler }} exceeded 5% for 5
            minutes. Callers see errors. Check worker logs for the
            task_type that feeds this endpoint, and the parse /
            external-API dashboards for correlating failures.

      - alert: VectoriaApiClientErrorSpike
        # Sustained 4xx spike usually means either (a) a new caller
        # is misusing the API (missing auth / bad payload shape) or
        # (b) a validation regression just shipped. Severity info
        # because the service is doing its job — but somebody should
        # still look.
        expr: |
          sum by (handler, status) (rate(http_requests_total{status=~"4..",status!="401",status!="404",handler!~"/metrics|/health.*"}[10m]))
          > 0.5
        for: 10m
        labels:
          severity: info
          component: api
        annotations:
          summary: "API 4xx spike on {{ $labels.handler }} (status={{ $labels.status }})"
          description: >
            Sustained {{ $labels.status }} responses on
            {{ $labels.handler }}. Often the first signal of a
            validation regression or a frontend/client that just
            started sending bad payloads. 401/404 excluded as noise.

      - alert: VectoriaApiLatencyHigh
        # p95 > 30 s means the callers who don't time out are
        # waiting half a minute for a response. Wait=true ingest
        # calls can legitimately take ~30 s (the config says
        # ``ingest_wait_timeout_seconds=30``) so this threshold is
        # tuned for the ingest path; tighten for pure-query deploys.
        expr: |
          histogram_quantile(
            0.95,
            sum by (handler, le) (rate(http_request_duration_seconds_bucket{handler!~"/metrics|/health.*"}[5m]))
          ) > 30
        for: 5m
        labels:
          severity: warning
          component: api
        annotations:
          summary: "API p95 latency >30s on {{ $labels.handler }}"
          description: >
            {{ $labels.handler }} p95 latency is above 30 seconds.
            Check: worker backlog (queue_depth), external-API
            latency (mineru / embedding), parser p95 per engine.

  # ---------------------------------------------------------------
  # Documents (ingest pipeline outcomes)
  # ---------------------------------------------------------------
  - name: vectoria.documents
    rules:

      - alert: VectoriaDocumentFailureRate
        # Top-level "% of documents ending up broken". Covers every
        # failure mode (parse_error, empty_content, too_large,
        # indexing_error) without pinning the alert to a specific
        # cause. Threshold 20% is deliberately generous — legitimate
        # corrupt inputs happen; tighten if your traffic is curated.
        expr: |
          sum(rate(vectoria_documents_total{outcome!="completed"}[10m]))
          /
          sum(rate(vectoria_documents_total[10m])) > 0.2
        for: 10m
        labels:
          severity: warning
          component: documents
        annotations:
          summary: "Document ingest failure rate >20%"
          description: >
            >20% of documents ingested in the last 10 minutes
            ended up in a failed terminal state. Break down by
            ``outcome`` in Grafana to pinpoint: empty_content
            points at a parser, too_large at upstream size bounds,
            parse_error at a parser exception.

      - alert: VectoriaParseEmptyRate
        # Empty-content rate per engine — the parser reported no
        # error but returned nothing useful. Typical causes: scanned
        # PDFs going through pdfium (no OCR), CAPTCHA-walled URLs
        # served by generic site handler, password-protected Office
        # files that mammoth/python-pptx silently accept.
        expr: |
          sum by (engine) (rate(vectoria_parse_empty_total[10m]))
          / ignoring() group_left
          sum by (engine) (rate(vectoria_parse_duration_seconds_count[10m])) > 0.3
        for: 10m
        labels:
          severity: warning
          component: parser
        annotations:
          summary: "{{ $labels.engine }} empty-result rate >30%"
          description: >
            Parser {{ $labels.engine }} is returning empty content
            on >30% of calls. Not an exception rate — these parses
            completed cleanly but had nothing to extract. If engine
            is ``ocr-native`` with image uploads, check rapidocr
            model version / language config. If ``pdfium``, likely
            scanned PDFs that need OCR — MinerU should own those.

  # ---------------------------------------------------------------
  # Queue health
  # ---------------------------------------------------------------
  - name: vectoria.queue
    rules:

      - alert: VectoriaQueueBacklogGrowing
        expr: vectoria_queue_depth > 50
        for: 5m
        labels:
          severity: warning
          component: queue
        annotations:
          summary: "Queue depth elevated for {{ $labels.task_type }}"
          description: >
            vectoria_queue_depth{task_type="{{ $labels.task_type }}"}
            has been above 50 for 5 minutes. Workers may be stuck or
            outpaced. Check worker logs, RSS, and external-API
            circuit state.

      - alert: VectoriaQueueTaskAging
        expr: vectoria_queue_oldest_age_seconds > 600
        for: 2m
        labels:
          severity: warning
          component: queue
        annotations:
          summary: "Oldest {{ $labels.task_type }} task >10min old"
          description: >
            A task of type {{ $labels.task_type }} has been pending
            more than 10 minutes. Typical parses complete in seconds;
            aging indicates a stuck worker or starvation (check
            tier=heavy pool for a runaway docling / mineru call).

      - alert: VectoriaDeadTaskAccumulating
        expr: vectoria_queue_dead_tasks > 0
        for: 1m
        labels:
          severity: warning
          component: queue
        annotations:
          summary: "Dead-letter tasks present for {{ $labels.task_type }}"
          description: >
            vectoria_queue_dead_tasks{task_type="{{ $labels.task_type }}"}
            is {{ $value }}. These exhausted max_attempts and need
            operator triage — inspect ``SELECT * FROM tasks WHERE
            status='dead'`` and decide whether to requeue or delete.

  # ---------------------------------------------------------------
  # Worker resource health
  # ---------------------------------------------------------------
  - name: vectoria.worker
    rules:

      - alert: VectoriaWorkerRssNearLimit
        # Fires when current RSS sits above 80% of the configured
        # self-kill threshold for 2 minutes — operators get a
        # proactive warning before the worker actually restarts
        # itself. The ``worker_rss_limit_bytes > 0`` filter skips
        # deploys where the cap is disabled (config default is 0).
        expr: |
          vectoria_worker_rss_bytes
          / on() vectoria_worker_rss_limit_bytes > 0.8
          and on() vectoria_worker_rss_limit_bytes > 0
        for: 2m
        labels:
          severity: warning
          component: worker
        annotations:
          summary: "Worker RSS >80% of self-kill cap"
          description: >
            Worker resident memory is within 20% of the configured
            self-kill threshold. A single large parse away from an
            automatic restart. Likely causes: heavy document
            in-flight (check parse_duration p95), RSS creep from a
            parser leak, or the cap is too tight for current load.

      - alert: VectoriaWorkerRssKillsOngoing
        # Any RSS self-kill in the last hour is worth surfacing —
        # self-kill is a last-resort backstop, not a routine event.
        expr: increase(vectoria_worker_rss_kills_total[1h]) > 0
        labels:
          severity: warning
          component: worker
        annotations:
          summary: "Worker self-killed on RSS limit"
          description: >
            {{ $value }} worker self-kill(s) in the last hour.
            Either the memory cap is too tight for current traffic,
            or a specific parse is leaking. Identify the task_type
            that preceded the kill via
            vectoria_task_duration_seconds.

  # ---------------------------------------------------------------
  # External dependencies
  # ---------------------------------------------------------------
  - name: vectoria.external
    rules:

      - alert: VectoriaCircuitOpen
        # circuit_state: 0=closed, 1=half_open, 2=open. Open >1 min
        # means the automatic recovery probe is failing repeatedly.
        expr: vectoria_circuit_state == 2
        for: 1m
        labels:
          severity: critical
          component: external
        annotations:
          summary: "Circuit {{ $labels.name }} is OPEN"
          description: >
            The {{ $labels.name }} circuit breaker opened. Downstream
            calls short-circuit until the reset timer probes success.
            Check the external service (mineru, vision API, embedding
            endpoint) — if it's genuinely down, the breaker is doing
            its job.

      - alert: VectoriaExternalAPIErrorRate
        expr: |
          sum by (api) (
            rate(vectoria_external_api_calls_total{status!="success"}[5m])
          )
          / ignoring(status) group_left
          sum by (api) (
            rate(vectoria_external_api_calls_total[5m])
          ) > 0.1
        for: 5m
        labels:
          severity: warning
          component: external
        annotations:
          summary: "{{ $labels.api }} error rate > 10%"
          description: >
            External API {{ $labels.api }} has >10% error rate over
            the last 5 minutes. If sustained, the circuit breaker
            will open.

  # ---------------------------------------------------------------
  # Parser health
  # ---------------------------------------------------------------
  - name: vectoria.parser
    rules:

      - alert: VectoriaParseErrorRate
        expr: |
          sum by (engine) (
            rate(vectoria_parse_duration_seconds_count{status="error"}[10m])
          )
          / ignoring(status) group_left
          sum by (engine) (
            rate(vectoria_parse_duration_seconds_count[10m])
          ) > 0.2
        for: 10m
        labels:
          severity: warning
          component: parser
        annotations:
          summary: "{{ $labels.engine }} parse error rate > 20%"
          description: >
            Parser {{ $labels.engine }} is failing >20% of calls.
            Check the parser's subprocess pool tier — a stuck child
            process can also surface here as timeouts.

      - alert: VectoriaParseTimeoutSpike
        expr: |
          sum(rate(vectoria_parse_duration_seconds_count{status="timeout"}[15m]))
          > 0
        for: 5m
        labels:
          severity: warning
          component: parser
        annotations:
          summary: "Parse timeouts observed"
          description: >
            Isolation-pool timeouts in the last 15 minutes. The pool
            is being recycled on each timeout but the upstream source
            (large or malformed file, hung docling/mineru call) is
            still a user-visible failure.

  # ---------------------------------------------------------------
  # Rate limiting / Redis
  # ---------------------------------------------------------------
  - name: vectoria.ratelimit
    rules:

      - alert: VectoriaRateLimitDegraded
        # Sustained local_fallback → Redis is unreachable, per-process
        # buckets are active. Not immediately user-impacting (fail-open),
        # but cross-worker coordination is lost and CDN bans become
        # more likely if traffic is heavy.
        expr: |
          sum(rate(vectoria_ratelimit_checks_total{result="local_fallback"}[5m]))
          > 0
        for: 5m
        labels:
          severity: warning
          component: ratelimit
        annotations:
          summary: "Rate limiter fell back to per-process buckets"
          description: >
            Redis has been unreachable for >5 minutes; each worker is
            rate-limiting independently. Check vectoria-redis-1
            container health and the limits.aio storage URL config.

      - alert: VectoriaRateLimitBlockedSpike
        # Sustained ``blocked`` spikes on a specific key indicate a
        # hot CDN (xhs/qpic/pbs.twimg) is throttling us. Not a bug
        # per se; operators want to know so they can tune the
        # per-domain bucket in parsers/url/_handlers.py.
        expr: |
          sum by (key) (rate(vectoria_ratelimit_checks_total{result="blocked"}[10m]))
          > 0.1
        for: 10m
        labels:
          severity: info
          component: ratelimit
        annotations:
          summary: "Frequent rate-limit blocks for key={{ $labels.key }}"
          description: >
            Image downloads for {{ $labels.key }} are being gated
            regularly. Consider raising the per-domain rate in
            parsers/url/_handlers.py if this CDN accepts higher
            sustained traffic without banning.
