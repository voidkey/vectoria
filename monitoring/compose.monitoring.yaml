# Monitoring stack: Prometheus + Grafana wired into the main vectoria
# compose network so they can scrape app:8000 and worker:9001 by
# service name.
#
# Usage (on deploy-host / any host running the main stack):
#
#   cd /root/app/src/vectoria
#   docker compose \
#     -f compose.yaml -f compose.prod.yaml \
#     -f monitoring/compose.monitoring.yaml \
#     --env-file .env.prod \
#     up -d prometheus grafana alertmanager alert-relay
#
# Or to run them in a separate project that joins the main network:
#
#   docker compose -f monitoring/compose.monitoring.yaml -p vectoria-mon up -d
#
# Alertmanager requires ``WECOM_WEBHOOK_URL`` in the .env (or shell
# env) so the alert-relay sidecar knows where to POST. Example:
#
#   WECOM_WEBHOOK_URL=https://qyapi.weixin.qq.com/cgi-bin/webhook/send?key=...
#
# Grafana defaults:
#   * URL:   http://<host>:3000
#   * Login: admin / admin  (change after first login; or set
#            GF_SECURITY_ADMIN_PASSWORD in the env)
#   * Prometheus datasource + Vectoria dashboard auto-provisioned.
#
# Prometheus URL (no auth — keep bound to loopback unless you front it
# with an auth proxy):
#   * http://127.0.0.1:9090

services:
  prometheus:
    image: ${PROM_IMAGE:-prom/prometheus:v2.55.1}
    restart: unless-stopped
    volumes:
      # Config + rules are mounted read-only; edits on disk hot-reload
      # via the /-/reload endpoint (no container restart).
      - ./monitoring/prometheus.yaml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/prometheus-rules.yaml:/etc/prometheus/rules.yaml:ro
      - vectoria_prom_data:/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=30d
      - --web.enable-lifecycle
    ports:
      # Loopback-only by default — Prometheus has no auth. Override
      # PROM_BIND=0.0.0.0 once a proper auth proxy is in front.
      - "${PROM_BIND:-127.0.0.1}:9090:9090"
    networks:
      - default
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:9090/-/ready"]
      interval: 10s
      timeout: 3s
      retries: 6

  grafana:
    image: ${GRAFANA_IMAGE:-grafana/grafana:11.2.0}
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: ${GF_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GF_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      # Install no external plugins; keep boot fast + supply chain small.
      GF_INSTALL_PLUGINS: ""
      # Postgres datasource connection — wired through so the
      # vectoria-badcases dashboard can query the documents table. In
      # prod, create a dedicated readonly role and set GRAFANA_DB_USER/
      # GRAFANA_DB_PASSWORD; dev falls back to the main Postgres creds.
      VECTORIA_DB_HOST: ${POSTGRES_HOST:-db}
      VECTORIA_DB_NAME: ${POSTGRES_DB:-vectoria}
      VECTORIA_DB_USER: ${GRAFANA_DB_USER:-${POSTGRES_USER:-postgres}}
      VECTORIA_DB_PASSWORD: ${GRAFANA_DB_PASSWORD:-${POSTGRES_PASSWORD:-postgres}}
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      # Mount a single dashboards dir; the provider config picks up any
      # .json in it. We reuse the existing flat grafana-dashboard.json
      # without moving files — the ``:ro`` mount is directory-scoped so
      # only that one file is visible inside the container.
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - vectoria_grafana_data:/var/lib/grafana
    ports:
      - "${GRAFANA_BIND:-0.0.0.0}:3000:3000"
    depends_on:
      prometheus:
        condition: service_healthy
    networks:
      - default
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:3000/api/health || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 6

  alertmanager:
    image: ${ALERTMANAGER_IMAGE:-prom/alertmanager:v0.28.0}
    restart: unless-stopped
    volumes:
      - ./monitoring/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - vectoria_am_data:/alertmanager
    command:
      - --config.file=/etc/alertmanager/alertmanager.yml
      - --storage.path=/alertmanager
    ports:
      - "${ALERTMANAGER_BIND:-127.0.0.1}:9093:9093"
    networks:
      - default
    depends_on:
      alert-relay:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:9093/-/ready"]
      interval: 10s
      timeout: 3s
      retries: 6

  alert-relay:
    # Tiny FastAPI service that reshapes Alertmanager's generic
    # webhook payload into WeChat group-bot format. Reuses the
    # vectoria image so no separate artifact to build or pin.
    image: ${VECTORIA_IMAGE:-voidkey/vectoria:latest}
    restart: unless-stopped
    command:
      - uvicorn
      - monitoring.alert_relay:app
      - --host
      - 0.0.0.0
      - --port
      - "8080"
    environment:
      WECOM_WEBHOOK_URL: ${WECOM_WEBHOOK_URL:-}
      RELAY_MAX_ALERTS: ${RELAY_MAX_ALERTS:-10}
    networks:
      - default
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import urllib.request,sys;sys.exit(0 if urllib.request.urlopen(\"http://localhost:8080/health\",timeout=3).status==200 else 1)'"]
      interval: 10s
      timeout: 3s
      retries: 6

volumes:
  vectoria_prom_data:
    name: vectoria_prom_data
  vectoria_grafana_data:
    name: vectoria_grafana_data
  vectoria_am_data:
    name: vectoria_am_data
