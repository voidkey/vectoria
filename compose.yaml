# Base stack: postgres (always) + MinIO (local dev only, behind `local` profile).
#
# Local development:  docker compose --profile local up -d
#                     uv run uvicorn main:app --reload   # app on host
#
# Production:         docker compose -f compose.yaml -f compose.prod.yaml up -d
#                     (prod uses external S3/TOS — no MinIO started)

services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: vectoria
    ports:
      - "5433:5432"
    volumes:
      - vectoria_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    profiles: ["local"]
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - vectoria_minio:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  minio-init:
    image: minio/mc:latest
    profiles: ["local"]
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin;
      mc mb local/vectoria --ignore-existing;
      "
    restart: "no"

volumes:
  # Pin literal volume names (no project prefix) so existing prod data under
  # `vectoria_pgdata` is picked up, and the same names work on a fresh host.
  vectoria_pgdata:
    name: vectoria_pgdata
  vectoria_minio:
    name: vectoria_minio
