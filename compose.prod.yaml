# Production overlay: adds the app service on top of compose.yaml.
#
# Normal prod:  ./scripts/deploy.sh       (pulls voidkey/vectoria:latest from Docker Hub)
# Build locally: ./scripts/build-push.sh  (builds via buildx and pushes to Docker Hub)
#
# No `build:` key here on purpose — prod should never build. If you really
# need to build on the host (emergency), run `docker build -t voidkey/vectoria:latest .`
# first, then re-run deploy.sh.

services:
  db:
    # Guard against a runaway query or autovacuum spike eating enough
    # host memory that the neighbouring app/worker containers also OOM.
    # 2 GB fits comfortably for low-hundreds-of-thousands docs with
    # pgvector indexes; bump when the dataset grows.
    mem_limit: 2g
    memswap_limit: 3g

  redis:
    # Rate-limit token buckets and shared state are O(keys × tokens),
    # tiny compared with app/worker memory. 512 MB leaves comfortable
    # headroom even if we start caching parse results here later.
    mem_limit: 512m
    memswap_limit: 1g

  app:
    image: ${VECTORIA_IMAGE:-voidkey/vectoria:latest}
    env_file: ${ENV_FILE:-.env.prod}
    # --limit-max-requests recycles each uvicorn worker after N requests to
    # bound pseudo-leak accumulation (glibc arena fragmentation, Python arena
    # retention). Supervisor brings it back automatically; restart cost is low
    # because heavy imports are already warmed in the image's model cache.
    command:
      ["uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8000",
       "--limit-max-requests", "1000"]
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    mem_limit: 1500m
    memswap_limit: 2g
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"

  worker:
    image: ${VECTORIA_IMAGE:-voidkey/vectoria:latest}
    env_file: ${ENV_FILE:-.env.prod}
    command: ["python", "-m", "worker"]
    expose: []
    healthcheck:
      test: ["CMD-SHELL", "[ -f /tmp/worker-heartbeat ] && [ $$(( $$(date +%s) - $$(cat /tmp/worker-heartbeat) )) -lt 120 ]"]
      interval: 30s
      timeout: 5s
      start_period: 30s
      retries: 3
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    mem_limit: 4g
    memswap_limit: 6g
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"
