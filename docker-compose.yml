services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: vectoria
    ports:
      - "5433:5432"
    volumes:
      - vectoria_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db/vectoria
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - vectoria_files:/app/data/files

volumes:
  vectoria_pgdata:
  vectoria_files:
